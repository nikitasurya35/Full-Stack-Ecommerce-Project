spring.application.name=product-service
server.port = 4000


#Postgres Config
spring.datasource.url=jdbc:postgresql://localhost:5432/e-commerce
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres123

#DB Migration
#make it 'false' for developemnt
spring.flyway.enabled=true 
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.default-schema=public


#JPA Config
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
#spring.jpa.hibernate.ddl-auto=update --un-comment for spring to create entity tables
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
#spring.sql.init.mode=always --un-comment for spring to create entity tables
spring.sql.init.mode=never
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.flywaydb=DEBUG

#PRODUCTION
#springdoc.api-docs.enabled=false